baseURL = "https://example.com/"
languageCode = "en-us"
title = "My Website"
theme = "win95-hugo"

paginate = 5
summaryLength = 40

[params]
  description = "Welcome to my corner of the internet"
  author = "Your Name"
  startYear = 2024
  # Show taskbar clock
  showClock = true

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

[markup]
  [markup.highlight]
    style = "monokailight"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
