<header class="site-header">
  <div class="panel-title"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></div>
  <nav class="site-nav">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </nav>
</header>
